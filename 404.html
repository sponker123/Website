<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sidan finns inte.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg stroke='%2326241F' stroke-width='7' stroke-linecap='round'%3E%3Cline x1='14' y1='40' x2='37' y2='59'/%3E%3Cline x1='37' y1='59' x2='62' y2='40'/%3E%3Cline x1='62' y1='40' x2='87' y2='59'/%3E%3C/g%3E%3Ccircle cx='14' cy='40' r='13.5' fill='%231B9E6E'/%3E%3Ccircle cx='37' cy='59' r='13' fill='%23D9502B'/%3E%3Ccircle cx='62' cy='40' r='13' fill='%23E9A83C'/%3E%3Ccircle cx='87' cy='59' r='12' fill='%23D28FC4'/%3E%3C/svg%3E">

<title>Sidan finns inte</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F7F8F6;--ink:#17241E;--soft:#4C5B53;--accent:#1F7A38;--card:#FFFFFF;--line:#CFDAD2}
html[data-tema="mork"]{--paper:#171B18;--ink:#E4EAE5;--soft:#9FAFA4;--accent:#3FA55E;--card:#20261F;--line:#39443B}
html[data-tema="mork"] a{color:var(--paper)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);
display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.kod{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:64px;font-weight:600;color:var(--accent)}
p{margin:10px 0 22px;color:var(--soft)}
a{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;
font-weight:600;padding:11px 22px;border-radius:8px}
h1,h2,h3{font-family:'Poppins',system-ui,sans-serif}
.temaknapp{position:fixed;top:14px;right:14px;z-index:60;width:40px;height:40px;
  border-radius:50%;border:1.5px solid var(--line);background:var(--card);color:var(--ink);
  cursor:pointer;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.18);padding:0}
.temaknapp:hover{transform:scale(1.07)}
</style>
<script data-tema-init>
(function(){
  var rot=document.documentElement;
  /* enda tillåtna lagringsnyckeln på sajten: temavalet.
     Statistik och historik sparas medvetet aldrig. */
  var sparat=null;
  try{ sparat=localStorage.getItem('tema'); }catch(e){}
  var systemMork=window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(sparat==='mork' || (sparat!=='ljus' && systemMork)){
    rot.dataset.tema='mork';
  }
  function uppdatera(btn){
    var mork=rot.dataset.tema==='mork';
    btn.textContent = mork ? '\u2600\uFE0F' : '\uD83C\uDF19';
    btn.setAttribute('aria-label', mork ? 'Byt till ljust l\u00e4ge' : 'Byt till m\u00f6rkt l\u00e4ge');
    btn.title = mork ? 'Byt till ljust l\u00e4ge' : 'Byt till m\u00f6rkt l\u00e4ge';
  }
  document.addEventListener('DOMContentLoaded',function(){
    var btn=document.getElementById('temaBtn');
    if(!btn) return;
    uppdatera(btn);
    btn.onclick=function(){
      var mork;
      if(rot.dataset.tema==='mork'){ delete rot.dataset.tema; mork=false; }
      else { rot.dataset.tema='mork'; mork=true; }
      try{ localStorage.setItem('tema', mork?'mork':'ljus'); }catch(e){}
      uppdatera(btn);
    };
  });
})();
</script>
</head>
<body>
<button class="temaknapp" id="temaBtn" type="button">🌙</button>
<div>
  <div class="kod">404</div>
  <p>Den här sidan finns inte. Reaktionen gav inget utbyte.</p>
  <a href="index.html">Till startsidan</a>
</div>
</body>
</html>
